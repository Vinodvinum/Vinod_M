<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinod M — AI Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:   #c9a84c;
  --gold2:  #f0d080;
  --cyan:   #4dd9e8;
  --violet: #9b6dff;
  --white:  #e8eef5;
  --dim:    rgba(232,238,245,0.5);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Rajdhani', sans-serif;
}

/* ── THREE.JS CANVAS ── */
#three-canvas {
  position: fixed; inset: 0;
  z-index: 0;
}

/* ── SPLASH OVERLAY ── */
#splash {
  position: fixed; inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

/* ── COSMIC FORM ── */
#cosmic-form {
  position: relative;
  width: clamp(160px, 22vw, 260px);
  height: clamp(160px, 22vw, 260px);
  opacity: 0;
  margin-bottom: 2.5vw;
}

/* Outer aura rings */
.aura-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
}
.aura-ring:nth-child(1) {
  width: 100%; height: 100%;
  border-color: rgba(201,168,76,0.5);
  box-shadow: 0 0 30px rgba(201,168,76,0.25);
  animation: pulsering 3s ease-in-out infinite;
}
.aura-ring:nth-child(2) {
  width: 128%; height: 128%;
  border-color: rgba(77,217,232,0.3);
  box-shadow: 0 0 40px rgba(77,217,232,0.15);
  animation: pulsering 3s ease-in-out 0.6s infinite;
}
.aura-ring:nth-child(3) {
  width: 158%; height: 158%;
  border-color: rgba(155,109,255,0.2);
  animation: pulsering 3s ease-in-out 1.2s infinite;
}

@keyframes pulsering {
  0%,100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
  50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.04); }
}

/* SVG cosmic silhouette */
.cosmic-svg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 18px rgba(201,168,76,0.8))
          drop-shadow(0 0 45px rgba(77,217,232,0.4))
          drop-shadow(0 0 80px rgba(201,168,76,0.3));
  animation: aurapulse 4s ease-in-out infinite;
}

@keyframes aurapulse {
  0%,100% { filter:
    drop-shadow(0 0 18px rgba(201,168,76,0.8))
    drop-shadow(0 0 45px rgba(77,217,232,0.35))
    drop-shadow(0 0 80px rgba(201,168,76,0.3)); }
  50% { filter:
    drop-shadow(0 0 30px rgba(201,168,76,1))
    drop-shadow(0 0 70px rgba(77,217,232,0.6))
    drop-shadow(0 0 120px rgba(155,109,255,0.4)); }
}

/* Central glow orb */
.center-orb {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 38%; height: 38%;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(240,208,128,0.95) 0%,
    rgba(201,168,76,0.6) 40%,
    rgba(77,217,232,0.2) 70%,
    transparent 100%
  );
  animation: orb 3.5s ease-in-out infinite;
}

@keyframes orb {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity:0.9; }
  50%      { transform: translate(-50%,-50%) scale(1.15); opacity:1; }
}

/* ── TEXT BLOCK ── */
#text-block {
  position: relative;
  text-align: center;
  z-index: 2;
}

.sanskrit {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(12px,1.3vw,15px);
  letter-spacing: 5px;
  color: rgba(201,168,76,0.65);
  margin-bottom: 14px;
  opacity: 0;
}

.name {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(36px,6.5vw,80px);
  letter-spacing: 8px;
  line-height: 1;
  background: linear-gradient(135deg, var(--gold2) 0%, var(--gold) 40%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  text-shadow: none;
  position: relative;
}

/* Shimmer sweep on name */
.name::after {
  content: 'VINOD M';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg,
    transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 200% 100%;
  animation: shimmer 3.5s linear 2.5s infinite;
}

@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.divider {
  width: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), var(--gold), transparent);
  margin: 16px auto;
  opacity: 0;
}

.role {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 400;
  font-size: clamp(12px,1.6vw,17px);
  letter-spacing: 5px;
  color: var(--dim);
  opacity: 0;
  text-transform: uppercase;
}

.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(11px,1.1vw,13px);
  letter-spacing: 2px;
  color: rgba(155,109,255,0.6);
  margin-top: 10px;
  opacity: 0;
}

/* ── MANDALA RING ── */
#mandala {
  position: fixed;
  width: clamp(500px, 70vw, 900px);
  height: clamp(500px, 70vw, 900px);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(0deg);
  z-index: 1;
  opacity: 0;
  pointer-events: none;
  animation: mandalaSpin 60s linear infinite;
}

@keyframes mandalaSpin {
  from { transform: translate(-50%,-50%) rotate(0deg); }
  to   { transform: translate(-50%,-50%) rotate(360deg); }
}

/* ── SKIP BUTTON ── */
#skip-btn {
  position: fixed;
  top: 24px; right: 28px;
  z-index: 100;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.3);
  color: rgba(201,168,76,0.65);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 7px 18px;
  cursor: pointer;
  border-radius: 1px;
  opacity: 0;
  pointer-events: all;
  transition: all 0.3s;
}
#skip-btn:hover {
  background: rgba(201,168,76,0.08);
  border-color: var(--gold);
  color: var(--gold2);
}

/* ── LOADING BAR ── */
#progress-bar {
  position: fixed;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  width: clamp(120px, 18vw, 200px);
  z-index: 20;
  opacity: 0;
}
#progress-track {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.1);
  border-radius: 1px;
  overflow: hidden;
}
#progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--violet), var(--cyan), var(--gold));
  border-radius: 1px;
  transition: width 0.1s linear;
  box-shadow: 0 0 8px rgba(77,217,232,0.5);
}
#progress-label {
  text-align: center;
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.25);
  margin-top: 8px;
}

/* ── HOMEPAGE ── */
#homepage {
  position: fixed; inset: 0;
  z-index: 5;
  background: radial-gradient(ellipse at 30% 40%, #0a0d1a 0%, #050508 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
}
#homepage-inner {
  text-align: center;
}
#homepage h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(22px, 4vw, 48px);
  letter-spacing: 6px;
  background: linear-gradient(135deg, var(--gold2), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#homepage p {
  font-family: 'Rajdhani', sans-serif;
  color: rgba(255,255,255,0.2);
  font-size: 13px;
  letter-spacing: 4px;
  margin-top: 12px;
}
</style>
</head>

<script>
// ──────────────────────────────────────────────
// THREE.JS STAR FIELD
// ──────────────────────────────────────────────
(function initThree() {
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000508, 1);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
  camera.position.z = 600;

  // Star geometry
  const STARS = 2200;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(STARS * 3);
  const colors    = new Float32Array(STARS * 3);
  const sizes     = new Float32Array(STARS);

  const palette = [
    [0.78, 0.85, 1.0],  // blue-white
    [1.0,  0.95, 0.75], // warm yellow
    [0.6,  0.85, 1.0],  // cyan
    [0.9,  0.75, 1.0],  // violet
    [1.0,  1.0,  1.0],  // white
  ];

  for (let i = 0; i < STARS; i++) {
    const i3 = i * 3;
    positions[i3]   = (Math.random() - 0.5) * 1800;
    positions[i3+1] = (Math.random() - 0.5) * 1800;
    positions[i3+2] = (Math.random() - 0.5) * 1200 - 200;
    const c = palette[Math.floor(Math.random() * palette.length)];
    colors[i3] = c[0]; colors[i3+1] = c[1]; colors[i3+2] = c[2];
    sizes[i] = Math.random() * 3.5 + 0.5;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  // Star texture via canvas
  const starTex = (function() {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const x = c.getContext('2d');
    const g = x.createRadialGradient(32,32,0, 32,32,32);
    g.addColorStop(0,   'rgba(255,255,255,1)');
    g.addColorStop(0.2, 'rgba(255,255,255,0.8)');
    g.addColorStop(0.5, 'rgba(200,220,255,0.3)');
    g.addColorStop(1,   'rgba(0,0,0,0)');
    x.fillStyle = g;
    x.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(c);
  })();

  const mat = new THREE.PointsMaterial({
    size: 2.5,
    sizeAttenuation: true,
    vertexColors: true,
    map: starTex,
    transparent: true,
    opacity: 0,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const stars = new THREE.Points(geo, mat);
  scene.add(stars);

  // Animate
  let raf;
  function animate() {
    raf = requestAnimationFrame(animate);
    stars.rotation.y += 0.00012;
    stars.rotation.x += 0.00006;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Expose for GSAP
  window._starMat = mat;
  window._stopThree = () => { cancelAnimationFrame(raf); };
})();

// ──────────────────────────────────────────────
// GSAP ANIMATION TIMELINE
// ──────────────────────────────────────────────
let exited = false;

function exitSplash() {
  if (exited) return;
  exited = true;

  gsap.to('#splash', { opacity: 0, duration: 0.7, ease: 'power2.inOut' });
  gsap.to('#mandala', { opacity: 0, duration: 0.5 });
  gsap.to('#progress-bar', { opacity: 0, duration: 0.3 });
  gsap.to('#skip-btn', { opacity: 0, duration: 0.3 });

  // Fade stars out
  gsap.to(window._starMat, { opacity: 0.12, duration: 1.2, ease: 'power2.inOut' });

  gsap.to('#homepage', {
    opacity: 1,
    duration: 1,
    delay: 0.4,
    ease: 'power2.inOut',
    pointerEvents: 'all'
  });
}

const tl = gsap.timeline({ onComplete: exitSplash });

// 0s — Stars fade in
tl.to(window._starMat, { opacity: 0.9, duration: 1.2, ease: 'power1.inOut' }, 0);

// Show progress bar
tl.to('#progress-bar', { opacity: 1, duration: 0.4 }, 0.2);

// Progress fill
tl.to('#progress-fill', { width: '100%', duration: 4.2, ease: 'none' }, 0.2);

// 1s — Mandala appears
tl.to('#mandala', { opacity: 1, duration: 1.2, ease: 'power2.inOut' }, 0.8);

// 1.5s — Cosmic form rises
tl.to('#cosmic-form', {
  opacity: 1, y: 0,
  duration: 1.0,
  ease: 'power3.out'
}, 1.2);

// Aura rings expand
tl.to('.aura-ring', {
  scale: 1,
  duration: 0.8,
  stagger: 0.2,
  ease: 'back.out(1.4)',
  transformOrigin: 'center center'
}, 1.5);

// 2.5s — Sanskrit line
tl.to('#txt-sanskrit', {
  opacity: 1, y: 0,
  duration: 0.5, ease: 'power2.out'
}, 2.3);

// Name
tl.to('#txt-name', {
  opacity: 1,
  duration: 0.6, ease: 'power3.out'
}, 2.65);

// Divider
tl.to('#txt-divider', {
  opacity: 1, width: 260,
  duration: 0.5, ease: 'power2.inOut'
}, 2.9);

// Role
tl.to('#txt-role', {
  opacity: 1,
  duration: 0.45, ease: 'power2.out'
}, 3.15);

// Tagline
tl.to('#txt-tagline', {
  opacity: 1,
  duration: 0.4, ease: 'power2.out'
}, 3.45);

// Show skip early
tl.to('#skip-btn', { opacity: 1, duration: 0.4 }, 0.6);

// Hold then exit
tl.to({}, { duration: 1.3 });

// Set initial states
gsap.set('#cosmic-form', { y: 30 });
gsap.set('#txt-sanskrit', { y: 8 });
gsap.set('.aura-ring', { scale: 0, transformOrigin: 'center center' });
gsap.set('#homepage', { pointerEvents: 'none' });

// Skip button
document.getElementById('skip-btn').addEventListener('click', () => {
  tl.kill();
  exitSplash();
});
</script>
</body>
</html>
